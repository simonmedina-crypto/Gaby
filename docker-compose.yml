version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tienda_gaby
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./tienda_Gaby/backend
    container_name: nova_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tienda_gaby
      CORS_ORIGINS: http://localhost:8080,http://100.79.75.118:8080
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build: ./tienda_Gaby/frontend
    container_name: nova_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: /api

volumes:
  postgres_data:
